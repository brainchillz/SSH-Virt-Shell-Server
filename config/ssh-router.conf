# SSH-Virt-Shell-Server configuration
# Sourced by all management scripts. Installed copy lives at
# /opt/ssh-router/config/ssh-router.conf and takes precedence for
# installed tools; the repo copy is only the default template.

# Name of the router (bastion) container that accepts outside SSH logins.
ROUTER_NAME="ssh-router"

# Prefix for per-user jail containers: user "alice" -> container "jail-alice".
JAIL_PREFIX="jail-"

# Image alias for the golden jail base image built by install.sh.
BASE_IMAGE_ALIAS="jail-base"

# Upstream image both the base image and the router are built from.
SOURCE_IMAGE="images:ubuntu/24.04"

# Incus network and storage pool used by the router and all jails.
INCUS_NETWORK="incusbr0"
INCUS_POOL="default"

# Incus profile applied to every jail container.
JAIL_PROFILE="ssh-jail"

# Public TCP port on the host that is forwarded to the router's sshd.
ROUTER_SSH_PORT="22"

# Host address the public SSH port listens on. The forward runs in NAT
# mode (so sshd and fail2ban see real client IPs), which cannot bind a
# wildcard address. Empty = auto-detect the host's primary address at
# install time; set explicitly on multi-homed hosts or if the primary
# address changes (then re-run install.sh).
ROUTER_LISTEN_ADDR=""

# Per-jail resource limits.
JAIL_CPU="1"
JAIL_MEMORY="1GiB"
JAIL_DISK="5GiB"

# Directory inside the router container that holds each user's private
# hop key (root-only; sshpiperd reads them as root).
KEYS_DIR="/etc/ssh-router/keys"

# Directory holding one pinned jail host-key file per user (sshpiper
# verifies the upstream against these; pinning is opt-in per pipe, so
# every generated pipe references its file).
KNOWN_HOSTS_DIR="/etc/ssh-router/known_hosts.d"

# Generated sshpiper pipe definitions, one YAML file per user. The yaml
# plugin re-reads the glob on every connection - no reload needed.
PIPES_DIR="/etc/sshpiperd/pipes.d"

# sshpiperd release to install in the router (see DESIGN.md). Bumping
# the version requires updating both checksums and re-running the e2e
# suite on all supported platforms.
SSHPIPER_VERSION="1.5.4"
SSHPIPER_SHA256_X86_64="f03ab1a52d2856094180388727788f0dc4ef9b436c0d9348c1363bdd689b4ec7"
SSHPIPER_SHA256_AARCH64="954eedf829329c58b07c57211c032919b54720b8f9ef1d4069372226290b28f0"

# Directory inside the router container that holds each user's optional
# public keys for router login (root-owned; users cannot edit their own).
AUTH_KEYS_DIR="/etc/ssh-router/authorized_keys"

# Host directory where 'jail-user-backup <user> export' writes tarballs.
BACKUP_DIR="/var/lib/ssh-router/backups"

# fail2ban settings applied to the router's sshd jail (see jail-fail2ban).
# Times take fail2ban units: s/m/h/d suffixes or plain seconds.
F2B_BANTIME="1h"
F2B_FINDTIME="10m"
F2B_MAXRETRY="5"

# Automatic OS package updates for the router + all jail containers,
# applied by the ssh-jails-update systemd timer (installed by install.sh).
# This covers the Ubuntu userspace INSIDE the containers only - NOT the
# host kernel every container shares, and NOT the pinned sshpiperd binary
# (bump SSHPIPER_VERSION + re-run install.sh for that).
# Empty schedule disables the timer (run `jail-update` by hand instead).
UPDATE_SCHEDULE="daily"     # any systemd OnCalendar value, e.g. "daily", "Sun *-*-* 03:00"

# --- install-prerequisites.sh settings ------------------------------------

# Port the HOST's own sshd is moved to, freeing ROUTER_SSH_PORT for the
# router container.
HOST_SSH_PORT="2222"

# Storage pool created for Incus if none exists yet. Driver falls back
# automatically (btrfs loop -> btrfs subvolume -> lvm thin -> dir) where
# unsupported; RHEL-family kernels have no btrfs and land on lvm.
POOL_DRIVER="btrfs"
POOL_SIZE="20GiB"

# COPR repos providing incus on Enterprise Linux (not in EPEL). The EL10
# value includes an explicit chroot because the project only builds the
# combined rhel+epel-10 variant.
COPR_EL9="neil/incus"
COPR_EL10="pgdev/incus rhel+epel-10-x86_64"

# --- webui/install-webui.sh settings (optional addon) ---------------------

# Bind address and HTTPS port for the admin web interface.
WEBUI_BIND="0.0.0.0"
WEBUI_PORT="8443"

# Optional admin-IP allowlist for the panel: space/comma-separated IPs or
# CIDRs (e.g. "203.0.113.5 10.0.0.0/8"). Empty = reachable from anywhere
# (the default; the panel stays remotely accessible). When set, clients
# outside the list get 403 before authentication. Re-run install-webui.sh
# after changing.
WEBUI_ALLOW=""

# HTTPS port for the optional end-user SELF-SERVICE PORTAL (a separate,
# unprivileged service; install with 'install-webui.sh --with-portal').
# Users sign in with their SSH credentials to manage their own password
# and login keys.
WEBUI_PORTAL_PORT="8444"

# TLS certificate for the web interface. Leave empty to use the
# self-signed pair generated at install time. To use your own cert, set
# both paths and re-run webui/install-webui.sh (or just restart the
# ssh-jails-webui service if the paths haven't changed).
WEBUI_CERT=""
WEBUI_KEY=""
